<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP HUB | Premium Tech & Tools</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">VIP<span>CORE</span></div>
        <div class="nav-links">
            <a href="#order-section">Order Devices</a>
            <a href="#tools-section">VIP Tools</a>
        </div>
    </nav>

    <div class="main-wrapper">
        
        <section id="order-section" class="glass-section">
            <div class="section-header">
                <i class="fas fa-shopping-cart"></i>
                <h2>Premium Order System</h2>
            </div>
            
            <div class="order-grid">
                <div class="input-group">
                    <label>Select iPhone Model</label>
                    <select id="iphone"></select>
                </div>

                <div class="input-group">
                    <label>Select iPad Tablet</label>
                    <select id="ipad"></select>
                </div>

                <div class="input-group">
                    <label>Select Apple Watch</label>
                    <select id="watch"></select>
                </div>

                <div class="input-group">
                    <label>Payment Method</label>
                    <select id="payment">
                        <option value="crypto">Cryptocurrency (BTC/USDT)</option>
                        <option value="cash">Cash on Delivery</option>
                        <option value="install">Installments</option>
                    </select>
                </div>
            </div>

            <button onclick="sendOrder()" class="btn-main pulse">Confirm VIP Order</button>
        </section>

        <hr class="separator">

        <section id="tools-section">
            <div class="section-header">
                <i class="fas fa-laptop-code"></i>
                <h2>VIP Forensic Tools</h2>
            </div>

            <div class="tools-grid">
                <div class="tool-card">
                    <span class="badge">V17.1</span>
                    <i class="fas fa-microchip tool-icon"></i>
                    <h3>Oxygen Forensic</h3>
                    <p>Advanced extraction without data formatting.</p>
                    <a href="https://www.mediafire.com/folder/cpxe6acypd69j/OXYGEN+17.1.0.131" class="btn btn-download">Download Folder</a>
                </div>

                <div class="tool-card">
                    <span class="badge gold">V7.71</span>
                    <i class="fas fa-unlock-alt tool-icon"></i>
                    <h3>UFED Celebrite</h3>
                    <p>Professional mobile unlocking & physical bypass.</p>
                    <div class="pass-box">Pass: <span>@gaddtech</span></div>
                    <div class="btn-group">
                        <a href="https://www.mediafire.com/folder/y28kdkqp8xnyi/UFED7.71" class="btn btn-outline">Setup</a>
                        <a href="https://drive.google.com/drive/folders/1HOpn4Qmsqc6TNN0s51pvO6Sqrg3eO4Ws" class="btn btn-crack">Crack</a>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>

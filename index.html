<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iRmovi VIP</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://www.paypal.com/sdk/js?client-id=BAAS2xAyomXSz_7ku-tR0zRnUe7gFcgW5RpO-5plpfNooz3GbDfCZ1jvBWQ8kErteHfaEU7tvxCqrTWlJY&components=buttons&currency=USD"></script>
<style>
body{font-family:'Poppins',sans-serif;margin:0;background:linear-gradient(135deg,#eef3f8,#dfe9f3)}
header{background:linear-gradient(90deg,#0d6efd,#00c6ff);color:#fff;padding:20px;text-align:center}
.logo{font-size:28px;font-weight:700}
.section{padding:30px;text-align:center}
.box{background:#fff;padding:25px;margin:auto;width:340px;border-radius:20px;box-shadow:0 10px 25px rgba(0,0,0,0.1)}
input,select{width:100%;padding:12px;margin:10px 0;border-radius:10px;border:1px solid #ddd}
footer{text-align:center;margin-top:20px;color:#555;padding:15px}
</style>
</head>
<body><header>
<div class="logo">iRmovi VIP</div>
<div>Premium Unlock Platform</div>
</header><div class="section">
<div class="box">
<h3>Order Service</h3><select id="service">
<option value="25">iPhone 6 - $25</option>
<option value="210">iPhone 17 Pro Max - $210</option>
</select><input id="imei" placeholder="Enter IMEI Number"><div id="paypal-button-container"></div>
<p id="msg"></p>
</div>
</div><footer>© 2026 iRmovi VIP</footer><script>
const TELEGRAM_BOT_TOKEN = "PUT_YOUR_BOT_TOKEN";
const TELEGRAM_CHAT_ID = "PUT_YOUR_CHAT_ID";

paypal.Buttons({
 createOrder: function(data, actions) {
   let price = document.getElementById('service').value;
   return actions.order.create({
     purchase_units: [{ amount: { value: price } }]
   });
 },
 onApprove: function(data, actions) {
   return actions.order.capture().then(function(details) {
     let imei = document.getElementById('imei').value;
     let service = document.getElementById('service').options[document.getElementById('service').selectedIndex].text;

     // إرسال إلى تيليجرام
     let message = `🔥 New Order\nIMEI: ${imei}\nService: ${service}\nStatus: Paid`;

     fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
       method: "POST",
       headers: { "Content-Type": "application/json" },
       body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: message })
     });

     document.getElementById('msg').innerText = '✅ Payment done! Order sent';
   });
 }
}).render('#paypal-button-container');
</script></body>
</html>

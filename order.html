<body class="bg-[#07070d] text-white p-6">
    <div class="max-w-md mx-auto bg-gray-900/50 p-8 rounded-3xl border border-gray-800 mt-10">
        <h2 class="text-3xl font-bold mb-6 text-center">Place Your <span class="text-blue-500">Order</span></h2>
        
        <div class="space-y-6">
            <div>
                <label class="block text-gray-400 text-sm mb-2">Device IMEI / Serial</label>
                <input id="imei" type="text" placeholder="Enter 15 digit IMEI" class="w-full bg-black border border-gray-700 p-4 rounded-xl focus:border-blue-500 outline-none">
            </div>

            <div>
                <label class="block text-gray-400 text-sm mb-2">Transaction ID (TXID)</label>
                <input id="txid" type="text" placeholder="Enter Payment Reference" class="w-full bg-black border border-gray-700 p-4 rounded-xl focus:border-blue-500 outline-none">
            </div>

            <button onclick="pay()" class="w-full bg-gradient-to-r from-blue-600 to-cyan-500 p-4 rounded-xl font-bold text-lg hover:opacity-90 transition">
                Submit via Telegram
            </button>
        </div>
    </div>
</body>

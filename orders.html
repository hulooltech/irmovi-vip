<!DOCTYPE html>
<html lang="ar">
<head><meta charset="UTF-8"><title>الطلبات</title></head>
<body>

<h2>الطلبات</h2>
<div id="orders"></div>

<script>
const orders = JSON.parse(localStorage.getItem("orders")) || [];
const div = document.getElementById("orders");

orders.forEach(o=>{
div.innerHTML += `
<hr>
👤 ${o.customer} <br>
💰 $${o.total} <br>
📅 ${o.date}
`;
});
</script>

</body>
</html>
